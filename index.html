<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main class='page'>
      <!-- <h2 class='page__title'>Services</h2> -->
      <div class="nav-container">
           <img src="ref/burger.svg" alt="burger" class="burger">
           <img src="ref/Group.svg" alt="logo" class='logo'>
           <img src="ref/divider.svg" alt="divider" class='divider'>
           <img src="ref/repair.svg" alt="repair" class='repair'>
           <img src="ref/checkstatus.svg" alt="check" class='check'>
           <img src="ref/call.svg" alt="call" class='call'>
           <img src="ref/chat.svg" alt="chat" class='chat'>
           <img src="ref/profile.svg" alt="profile" class='profile'>
      </div>
      <div class="service-container">
        <div class="service-title">
          <img src="ref/highlight.svg" alt="image" width="4px">
          <h1>Услуги и сервисы</h1>
        </div>
        <div class="service-button">
          <button1>Ремонтируемые бренды</button1>
          <button>Ремонтируемые устройства</button>
          <button>Цены на услуги</button>
          <button>Адреса сервисных центров</button>
          <button>Специальные цены</button>
        </div>
      <div class="grid-box">  
        <div class="service-content">
          <p>Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только у нас вы можете отремонтировать свой ноутбук Dell с официальной гарантией производителя.
          </p>
          <div class="read-more">
            <img src="ref/expand.svg" style="vertical-align: middle; width: 20px;">
            <span>Читать далее</span>
          </div>
        </div>

        <div class="service-image">
          <img src="ref/picture.svg" alt="image">
        </div>
      </div>
    </main>
  </body>
</html>
